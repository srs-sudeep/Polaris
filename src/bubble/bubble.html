<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Bubble</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: 0;
        }

        .bubble {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(19, 26, 42, 0.97), rgba(22, 31, 50, 0.94));
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.32);
            animation: bubbleIn 140ms ease-out;
        }

        .bubble.error {
            background: linear-gradient(135deg, rgba(68, 25, 25, 0.97), rgba(33, 28, 36, 0.94));
        }

        .label {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: #f3b35c;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .translation {
            flex: 1;
            overflow: auto;
            color: #ffffff;
            font-size: 15px;
            font-weight: 660;
            line-height: 1.45;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .original {
            max-height: 44px;
            overflow: hidden;
            padding-top: 9px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(248, 250, 252, 0.62);
            font-size: 12px;
            line-height: 1.35;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .original:empty {
            display: none;
        }

        @keyframes bubbleIn {
            from {
                opacity: 0;
                transform: translateY(4px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <section class="bubble" id="bubble">
        <div class="label">
            <span id="sourceLabel">Polaris</span>
            <span id="providerLabel">Free APIs</span>
        </div>
        <div class="translation" id="translationText">Translating...</div>
        <div class="original" id="originalText"></div>
    </section>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            window.polaris.onBubblePayload((payload) => {
                document.getElementById('bubble').classList.toggle('error', Boolean(payload.isError));
                document.getElementById('sourceLabel').textContent = payload.sourceLabel || 'Polaris';
                document.getElementById('providerLabel').textContent = payload.provider || 'Free APIs';
                document.getElementById('translationText').textContent = payload.translation || '';
                document.getElementById('originalText').textContent = payload.original || '';
            });

            setTimeout(() => window.close(), 7000);
        });
    </script>
</body>
</html>
